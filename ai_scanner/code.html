<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI Scanner - Digital Agronomist</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Public+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error": "#ffffff",
              "surface-container-high": "#e7e8e9",
              "secondary-fixed-dim": "#94ccff",
              "tertiary-fixed": "#ffdea9",
              "primary-fixed-dim": "#a0d3a5",
              "on-secondary-container": "#004972",
              "on-tertiary-fixed-variant": "#5e4100",
              "surface-container-highest": "#e1e3e4",
              "secondary": "#006399",
              "background": "#f8f9fa",
              "on-surface-variant": "#40493d",
              "surface-variant": "#e1e3e4",
              "surface-container-lowest": "#ffffff",
              "on-primary": "#ffffff",
              "on-primary-container": "#cafece",
              "on-primary-fixed": "#00210a",
              "surface-bright": "#f8f9fa",
              "outline": "#707a6c",
              "primary-fixed": "#bcefc0",
              "on-tertiary-container": "#ffefd9",
              "on-error-container": "#93000a",
              "tertiary": "#714f00",
              "surface": "#f8f9fa",
              "surface-tint": "#3a6843",
              "tertiary-container": "#906600",
              "on-secondary-fixed-variant": "#004b74",
              "outline-variant": "#bfcaba",
              "primary": "#315f3b",
              "on-background": "#191c1d",
              "primary-container": "#497851",
              "error": "#ba1a1a",
              "on-secondary": "#ffffff",
              "tertiary-fixed-dim": "#ffba27",
              "surface-container": "#edeeef",
              "inverse-on-surface": "#f0f1f2",
              "inverse-primary": "#a0d3a5",
              "surface-dim": "#d9dadb",
              "error-container": "#ffdad6",
              "secondary-container": "#67bafd",
              "secondary-fixed": "#cde5ff",
              "on-tertiary-fixed": "#271900",
              "inverse-surface": "#2e3132",
              "on-surface": "#191c1d",
              "on-primary-fixed-variant": "#22502d",
              "surface-container-low": "#f3f4f5",
              "on-secondary-fixed": "#001d32",
              "on-tertiary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Public Sans"],
              "label": ["Public Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scanner-frame {
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.4);
        }
        .scan-line {
            animation: scan 3s ease-in-out infinite;
            background: linear-gradient(to bottom, transparent, #bcefc0, transparent);
        }
        @keyframes scan {
            0%, 100% { top: 0%; }
            50% { top: 100%; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-surface antialiased overflow-hidden">
<!-- Top AppBar (JSON Mapping) -->
<header class="fixed top-0 w-full z-50 bg-slate-50/80 dark:bg-slate-900/80 backdrop-blur-md shadow-sm dark:shadow-none">
<div class="flex justify-between items-center px-6 py-3 w-full">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden border border-outline-variant/30">
<img alt="User profile photo" data-alt="Close-up portrait of a professional agronomist in a sunlit field, wearing a clean linen shirt and a friendly expression." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBJVNANgwWLxqP7hmoyA68kEmV3RvyLh1Ht9mfpsVFQX0PN8xAi6_Nnv0jp8cKnuN7XCG2UvPE0LjzMI48SqQX5Jkvl3WxZL6jYvpmkpDaG6xAIiZpZ83RRvuEnx2TTZD9miuRFhb5xFSvA6JqX2JiRuP7dnYKTmt1-kFR-4RTwqeSPSlLqT0gy6NT50tWsXhas7-LSZJvypIojt0sOnc__HoWdV0TY32zVaJnijU3ovKmTqu6mKFWLovL73FataPnfQ901wpr6QTE"/>
</div>
<h1 class="font-manrope font-bold text-lg tracking-tight text-emerald-800 dark:text-emerald-400">Digital Agronomist</h1>
</div>
<button class="material-symbols-outlined text-slate-600 dark:text-slate-400 hover:bg-emerald-50 dark:hover:bg-emerald-900/30 transition-colors p-2 rounded-full active:scale-95 duration-200" data-icon="notifications">
                notifications
            </button>
</div>
<div class="bg-slate-200/50 dark:bg-slate-800/50 h-px w-full"></div>
</header>
<main class="relative h-screen w-full flex flex-col pt-[57px] pb-[80px]">
<!-- Camera Viewfinder Hero -->
<section class="relative flex-1 bg-black overflow-hidden">
<img alt="Agriculture view" class="absolute inset-0 w-full h-full object-cover opacity-90" data-alt="Macro photography of a vibrant green soybean leaf with intricate vein patterns under bright, diffused natural sunlight." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBdU5RzklizIgna72KiCvQ4aYz9eu0IOf15aApMZOGbQAyNQ0vzN2gR2Sr2g1OP_OlH__Y1Hfsa28r9Mswl8ROd9HhBZGRr6E2tR-nevTpe4HdBXKwbx8vMCDjGKIrxyikhEIqIdtsdwrMKzviVb8MSH-EzIMlMkbi_n0t_M6TM7xgA4snoEtk0UWslsuGBcN23HlhDKii9NScGnrsjqU7-LlkGv6vSpAFXxu28YdB-q-HFaIrOy8a5I6ru2QDF-XRQkqae4CatLWA"/>
<!-- Viewfinder Overlay -->
<div class="absolute inset-0 flex items-center justify-center p-8 pointer-events-none">
<div class="relative w-full max-w-sm aspect-square border-2 border-primary-fixed/50 rounded-3xl scanner-frame overflow-hidden">
<!-- Corner Brackets -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl-xl"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary rounded-tr-xl"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl-xl"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary rounded-br-xl"></div>
<!-- Scanning Animation Line -->
<div class="scan-line absolute left-0 w-full h-1 z-10"></div>
</div>
</div>
<!-- Top Controls Over Camera -->
<div class="absolute top-4 inset-x-0 flex justify-between px-6 z-20">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-black/30 backdrop-blur-md text-white border border-white/20 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="flash_on">flash_on</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-black/30 backdrop-blur-md text-white border border-white/20 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="photo_library">photo_library</span>
</button>
</div>
<!-- Status Indicator -->
<div class="absolute top-20 inset-x-0 flex justify-center z-20">
<div class="bg-primary/90 backdrop-blur-md text-on-primary px-4 py-1.5 rounded-full flex items-center gap-2 shadow-lg">
<span class="w-2 h-2 rounded-full bg-white animate-pulse"></span>
<span class="font-label text-xs font-bold uppercase tracking-widest">Analyzing...</span>
</div>
</div>
<!-- Focus Tips (Asymmetric Placement) -->
<div class="absolute bottom-32 left-6 right-6 z-20 flex flex-col items-center">
<div class="bg-surface-container-lowest/80 backdrop-blur-lg p-4 rounded-xl shadow-xl max-w-xs border border-outline-variant/20">
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-primary text-xl" data-icon="tips_and_updates">tips_and_updates</span>
<div>
<p class="font-headline text-sm font-bold text-on-surface">Precision Tip</p>
<p class="font-body text-xs text-on-surface-variant leading-relaxed">Ensure good lighting and center the leaf inside the frame for 98% accuracy.</p>
</div>
</div>
</div>
</div>
<!-- Scan Type Toggles (Material Floating UI) -->
<div class="absolute bottom-6 inset-x-0 px-6 z-20">
<div class="bg-black/40 backdrop-blur-xl p-1.5 rounded-2xl flex items-center border border-white/10 shadow-2xl">
<button class="flex-1 flex flex-col items-center justify-center py-3 rounded-xl bg-primary text-on-primary shadow-sm transition-all">
<span class="material-symbols-outlined text-2xl mb-1" data-icon="coronavirus" data-weight="fill" style="font-variation-settings: 'FILL' 1;">coronavirus</span>
<span class="font-label text-[10px] font-bold tracking-widest uppercase">Disease Search</span>
</button>
<button class="flex-1 flex flex-col items-center justify-center py-3 rounded-xl text-white/70 hover:text-white transition-all">
<span class="material-symbols-outlined text-2xl mb-1" data-icon="pest_control">pest_control</span>
<span class="font-label text-[10px] font-bold tracking-widest uppercase">Insect ID</span>
</button>
</div>
</div>
</section>
<!-- Shutter Button Area -->
<section class="h-32 bg-surface-container-low flex items-center justify-center relative overflow-hidden">
<!-- Background Texture/Gradient for Premium Feel -->
<div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(circle at center, #315f3b 0%, transparent 70%);"></div>
<<button id="shutter-button" class="group relative w-20 h-20 flex items-center justify-center rounded-full bg-surface-container-lowest shadow-2xl active:scale-95 transition-transform duration-150 border-4 border-primary/20">
    <div class="w-16 h-16 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-lg group-hover:scale-105 transition-transform">
        <span class="material-symbols-outlined text-white text-3xl" data-icon="camera">camera</span>
    </div>
</button>
</section>
</main>
<!-- Bottom Navigation (JSON Mapping) -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-2xl bg-white/90 dark:bg-slate-950/90 backdrop-blur-lg border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_24px_rgba(25,28,29,0.04)]">
<div class="flex justify-around items-center w-full px-2 pb-6 pt-2">
<!-- Fields -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1.5 hover:text-emerald-700 dark:hover:text-emerald-300 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="Agriculture">agriculture</span>
<span class="font-public-sans text-[11px] font-medium tracking-wide uppercase mt-1">Fields</span>
</a>
<!-- Weather -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1.5 hover:text-emerald-700 dark:hover:text-emerald-300 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="Wb_sunny">wb_sunny</span>
<span class="font-public-sans text-[11px] font-medium tracking-wide uppercase mt-1">Weather</span>
</a>
<!-- Scan (ACTIVE) -->
<a class="flex flex-col items-center justify-center bg-emerald-100/50 dark:bg-emerald-900/40 text-emerald-900 dark:text-emerald-100 rounded-xl px-3 py-1.5 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="Center_focus_strong" data-weight="fill" style="font-variation-settings: 'FILL' 1;">center_focus_strong</span>
<span class="font-public-sans text-[11px] font-bold tracking-wide uppercase mt-1">Scan</span>
</a>
<!-- Insights -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1.5 hover:text-emerald-700 dark:hover:text-emerald-300 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="Psychology">psychology</span>
<span class="font-public-sans text-[11px] font-medium tracking-wide uppercase mt-1">Insights</span>
</a>
<!-- Settings -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1.5 hover:text-emerald-700 dark:hover:text-emerald-300 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="Settings">settings</span>
<span class="font-public-sans text-[11px] font-medium tracking-wide uppercase mt-1">Settings</span>
</a>
</div>
</nav>
<script src="../static/js/scanner.js"></script>
</body></html>
